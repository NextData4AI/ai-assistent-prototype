<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      background: #fff;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 16px 16px 12px;
      background: #fff;
      position: relative;
      z-index: 10;
    }
    .back-btn {
      font-size: 22px;
      color: #333;
      cursor: pointer;
      padding: 4px 8px;
      background: none;
      border: none;
      line-height: 1;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-left: 8px;
      background: #f0e6d3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-placeholder {
      font-size: 24px;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      margin-left: 10px;
      flex: 1;
    }
    .menu-btn {
      font-size: 20px;
      color: #333;
      cursor: pointer;
      padding: 4px 8px;
      background: none;
      border: none;
      letter-spacing: 2px;
      font-weight: bold;
    }
    /* Sidebar Toggle & Header New Chat */
    .sidebar-toggle-btn, .header-new-chat-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: none;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .sidebar-toggle-btn:hover, .header-new-chat-btn:hover { background: #f0f0f0; }
    .sidebar-toggle-btn:active, .header-new-chat-btn:active { background: #e5e5e5; }
    /* Sidebar Drawer */
    .sidebar-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 40;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.active { display: block; }
    .sidebar-drawer {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 82%;
      max-width: 320px;
      background: #fff;
      z-index: 50;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
    }
    .sidebar-drawer.active { transform: translateX(0); }
    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 12px 8px;
    }
    .sidebar-search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 8px 14px;
      border: 1px solid #e8e8e8;
    }
    .sidebar-search input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      outline: none;
      color: #1a1a1a;
    }
    .sidebar-search input::placeholder { color: #aaa; }
    .sidebar-search svg { color: #999; flex-shrink: 0; }
    .sidebar-new-btn, .sidebar-close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: none;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .sidebar-new-btn:hover, .sidebar-close-btn:hover { background: #f0f0f0; }
    .sidebar-menu {
      padding: 4px 0;
    }
    .sidebar-menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      cursor: pointer;
      font-size: 15px;
      color: #1a1a1a;
      transition: background 0.15s;
    }
    .sidebar-menu-item:hover { background: #f5f5f5; }
    .sidebar-menu-item:active { background: #eee; }
    .sidebar-menu-item svg { color: #555; flex-shrink: 0; }
    .sidebar-divider {
      height: 1px;
      background: #f0f0f0;
      margin: 4px 16px;
    }
    .sidebar-conversations {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .sidebar-conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .sidebar-conv-item:hover { background: #f5f5f5; }
    .sidebar-conv-item:active { background: #eee; }
    .sidebar-conv-item.active-session { background: #f0f0f0; }
    .sidebar-conv-title {
      flex: 1;
      font-size: 14px;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-conv-delete {
      width: 26px;
      height: 26px;
      border: none;
      background: none;
      color: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-conv-item:hover .sidebar-conv-delete { color: #ccc; }
    .sidebar-conv-delete:hover { color: #e53935; background: #fef0f0; }
    /* Dropdown (removed - replaced by sidebar) */
    .dropdown-overlay { display: none; }
    .dropdown-menu { display: none; }
    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
    }
    .welcome-section {
      text-align: center;
      padding: 40px 0 20px;
    }
    .welcome-title {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .welcome-text {
      font-size: 15px;
      color: #555;
      line-height: 1.5;
      max-width: 300px;
      margin: 0 auto;
    }
    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 8px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .message.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 6px;
    }
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
      background: #f0f0f0;
      border-radius: 18px;
      border-bottom-left-radius: 6px;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: #999;
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    /* Input Area */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
    }
    .suggestion-chip {
      padding: 8px 14px;
      border-radius: 18px;
      border: 1px solid #e0e0e0;
      background: #fff;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.3;
    }
    .suggestion-chip:hover {
      background: #f5f5f5;
      border-color: #ccc;
    }
    .suggestion-chip:active {
      background: #eee;
    }
    .input-area {
      padding: 12px 16px 8px;
      background: #fff;
    }
    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 24px;
      padding: 4px 6px 4px 18px;
      border: 1px solid #e8e8e8;
    }
    .input-wrapper:focus-within {
      border-color: #ccc;
    }
    #messageInput {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      outline: none;
      color: #1a1a1a;
      padding: 10px 0;
    }
    #messageInput::placeholder { color: #aaa; }
    .mic-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .mic-btn:hover { background: #eee; }
    .mic-btn:active { background: #ddd; }
    .mic-btn.recording {
      color: #e53935;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    /* Bottom Bar (home indicator) */
    .bottom-bar {
      display: flex;
      justify-content: center;
      padding: 8px 0 12px;
      background: #fff;
    }
    .bottom-bar::after {
      content: '';
      width: 134px;
      height: 5px;
      background: #1a1a1a;
      border-radius: 3px;
    }
    /* Responsive */
    @media (max-width: 420px) {
      .phone-frame {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }
    }
    /* Views */
    .view {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <!-- ========== CHAT VIEW ========== -->
    <div class="view" id="chatView">
      <!-- Header -->
      <div class="header">
        <button class="back-btn" id="backBtn" aria-label="返回">‹</button>
        <div class="avatar">
          <span class="avatar-placeholder">🧓</span>
        </div>
        <span class="header-title">Smart Assistant</span>
        <button class="header-new-chat-btn" id="headerNewChatBtn" aria-label="新建对话">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="打开侧边栏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Sidebar Drawer Overlay -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <!-- Sidebar Drawer -->
      <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="sidebar-header">
          <div class="sidebar-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="sidebarSearch" placeholder="搜索" autocomplete="off">
          </div>
          <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="关闭侧边栏">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="sidebar-menu">
          <div class="sidebar-menu-item" id="sidebarNewChat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            <span>新聊天</span>
          </div>
          <div class="sidebar-menu-item" id="sidebarSettings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
          </div>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-conversations" id="sidebarConversations">
          <!-- dynamically populated -->
        </div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea">
        <div class="welcome-section">
          <h1 class="welcome-title">Hi, there!</h1>
          <p class="welcome-text">This is the FranklinWH automated assistant. Type in your question, and get an instant answer.</p>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <!-- Suggested Questions -->
      <div class="suggestions" id="suggestions">
        <div class="suggestion-chip" data-q="How does FranklinWH battery work?">How does FranklinWH battery work?</div>
        <div class="suggestion-chip" data-q="What is the warranty policy?">What is the warranty policy?</div>
        <div class="suggestion-chip" data-q="How to install the system?">How to install the system?</div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
          <button class="mic-btn" id="micBtn" aria-label="语音输入">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Bottom Bar -->
      <div class="bottom-bar"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
